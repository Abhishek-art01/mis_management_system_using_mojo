<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <!-- Glow filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-subtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff9d"/>
    </linearGradient>
    <linearGradient id="grad-icon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#007aaa" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#050d17"/>
      <stop offset="100%" stop-color="#030a10"/>
    </linearGradient>
    <linearGradient id="grad-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="60%"  stop-color="#c8f0ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="160" rx="4" fill="url(#grad-bg)"/>

  <!-- Subtle grid overlay -->
  <line x1="0" y1="40"  x2="400" y2="40"  stroke="rgba(0,212,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="80"  x2="400" y2="80"  stroke="rgba(0,212,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="rgba(0,212,255,0.04)" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="160" stroke="rgba(0,212,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="160" stroke="rgba(0,212,255,0.04)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="160" stroke="rgba(0,212,255,0.04)" stroke-width="1"/>

  <!-- ── ICON MARK (left) ─────────────────────────── -->
  <g transform="translate(28, 28)">

    <!-- Outer frame -->
    <rect x="0" y="0" width="104" height="104" rx="2"
      fill="none" stroke="#0d4a6e" stroke-width="1"/>

    <!-- Corner brackets -->
    <polyline points="0,14 0,0 14,0"   fill="none" stroke="url(#grad-cyan)" stroke-width="2.5"/>
    <polyline points="90,0 104,0 104,14"  fill="none" stroke="url(#grad-cyan)" stroke-width="2.5"/>
    <polyline points="104,90 104,104 90,104" fill="none" stroke="url(#grad-cyan)" stroke-width="2.5"/>
    <polyline points="14,104 0,104 0,90"  fill="none" stroke="url(#grad-cyan)" stroke-width="2.5"/>

    <!-- Inner glowing hex ring -->
    <polygon points="52,14 80,30 80,64 52,80 24,64 24,30"
      fill="rgba(0,212,255,0.04)" stroke="#00d4ff" stroke-width="1"
      filter="url(#glow-subtle)"/>

    <!-- Centre M letterform made from geometric bars -->
    <!-- Left vertical -->
    <rect x="30" y="32" width="7" height="34" rx="1" fill="url(#grad-icon)" filter="url(#glow-subtle)"/>
    <!-- Right vertical -->
    <rect x="67" y="32" width="7" height="34" rx="1" fill="url(#grad-icon)" filter="url(#glow-subtle)"/>
    <!-- Left diagonal down -->
    <polygon points="37,32 44,32 52,50 44,50" fill="url(#grad-icon)" filter="url(#glow-subtle)"/>
    <!-- Right diagonal down -->
    <polygon points="60,32 67,32 60,50 52,50" fill="url(#grad-icon)" filter="url(#glow-subtle)"/>

    <!-- Glowing dot at top centre -->
    <circle cx="52" cy="26" r="3.5" fill="#00ff9d" filter="url(#glow-strong)"/>
    <circle cx="52" cy="26" r="1.5" fill="#ffffff"/>

    <!-- Bottom accent line -->
    <line x1="22" y1="74" x2="82" y2="74" stroke="url(#grad-cyan)" stroke-width="1" opacity="0.6"/>

    <!-- Tick marks -->
    <line x1="22" y1="71" x2="22" y2="74" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="37" y1="71" x2="37" y2="74" stroke="#00d4ff" stroke-width="1"/>
    <line x1="52" y1="70" x2="52" y2="74" stroke="#00ff9d" stroke-width="1.5"/>
    <line x1="67" y1="71" x2="67" y2="74" stroke="#00d4ff" stroke-width="1"/>
    <line x1="82" y1="71" x2="82" y2="74" stroke="#00d4ff" stroke-width="1.5"/>

    <!-- Sub label -->
    <text x="52" y="92" text-anchor="middle"
      font-family="'Courier New', monospace" font-size="7"
      letter-spacing="4" fill="#3a7a9c" text-decoration="none">SYS.v4</text>
  </g>

  <!-- ── WORDMARK (right) ────────────────────────── -->
  <g transform="translate(152, 0)">

    <!-- MIS letters -->
    <text x="0" y="100"
      font-family="'Arial Black', 'Impact', sans-serif"
      font-size="82" font-weight="900"
      letter-spacing="-2"
      fill="url(#grad-text)"
      filter="url(#glow-cyan)">MIS</text>

    <!-- Underline accent -->
    <rect x="2" y="108" width="192" height="2" rx="1" fill="url(#grad-cyan)" opacity="0.8"/>
    <rect x="2" y="112" width="80"  height="1" rx="0.5" fill="#00d4ff" opacity="0.3"/>

    <!-- Sub-title -->
    <text x="3" y="132"
      font-family="'Courier New', monospace"
      font-size="9.5" letter-spacing="5"
      fill="#3a7a9c">MANAGEMENT INFO SYSTEM</text>

    <!-- Right-side decorative dots -->
    <circle cx="200" cy="120" r="2.5" fill="#00ff9d" filter="url(#glow-subtle)"/>
    <circle cx="208" cy="120" r="1.5" fill="#00d4ff" opacity="0.5"/>
    <circle cx="214" cy="120" r="1"   fill="#00d4ff" opacity="0.3"/>
  </g>

  <!-- Outer border glow -->
  <rect x="1" y="1" width="398" height="158" rx="4"
    fill="none" stroke="url(#grad-cyan)" stroke-width="1" opacity="0.25"/>
  <rect x="3" y="3" width="394" height="154" rx="3"
    fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.08"/>
</svg>
